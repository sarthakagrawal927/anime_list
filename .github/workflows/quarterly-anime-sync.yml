name: Quarterly Anime Sync

on:
  schedule:
    # Quarterly at 00:00 UTC on Jan 1, Apr 1, Jul 1, Oct 1
    - cron: "0 0 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing database changes"
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Run quarterly sync
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "Starting quarterly anime sync..."
          if [ "$DRY_RUN" = "true" ]; then
            pnpm run db:quarterly-sync -- --dry-run
          else
            pnpm run db:quarterly-sync
          fi
          echo "✓ Quarterly anime sync finished"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Quarterly anime sync failed. Check workflow logs."
