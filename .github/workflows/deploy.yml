name: Deploy anime_list to Cloudflare Pages
on:
  push:
    branches: [main]
    paths: ['app/**', 'src/**', 'components/**', 'lib/**', 'package.json', 'next.config.*', 'open-next.config.ts', 'wrangler.toml']
  pull_request:
    branches: [main]
    paths: ['app/**', 'src/**', 'components/**', 'lib/**', 'package.json', 'next.config.*', 'open-next.config.ts', 'wrangler.toml']

jobs:
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy --project-name=anime-list-web --branch=main --commit-dirty=true

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy --project-name=anime-list-web --branch=pr-${{ github.event.number }} --commit-dirty=true
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview: https://pr-${{ github.event.number }}.anime-list-web.pages.dev`
            })
